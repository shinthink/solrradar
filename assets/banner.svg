<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#0f0f2e"/>
      <stop offset="100%" stop-color="#1a0a0f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#FF0044"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF8C42"/>
      <stop offset="100%" stop-color="#FF3366"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.03" stroke="#ffffff">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="100" cy="530" r="200" fill="none" stroke="#FF6B00" stroke-width="0.5" opacity="0.05"/>
  <circle cx="1100" cy="100" r="150" fill="none" stroke="#FF0044" stroke-width="0.5" opacity="0.05"/>
  <circle cx="1050" cy="550" r="100" fill="none" stroke="#FF6B00" stroke-width="0.5" opacity="0.07"/>

  <!-- Shields / Badges -->
  <rect x="70" y="72" width="180" height="30" rx="4" fill="#3776AB" opacity="0.9"/>
  <text x="95" y="93" font-family="monospace" font-size="14" fill="#fff" font-weight="bold">🐍 PYTHON 3.8+</text>

  <rect x="262" y="72" width="220" height="30" rx="4" fill="#CC0000" opacity="0.9"/>
  <text x="292" y="93" font-family="monospace" font-size="14" fill="#fff" font-weight="bold">🔥 CVE-2026-44825</text>

  <rect x="494" y="72" width="130" height="30" rx="4" fill="#97CA00" opacity="0.9"/>
  <text x="520" y="93" font-family="monospace" font-size="14" fill="#fff" font-weight="bold">📜 MIT</text>

  <!-- Main icon (comet/shield shape) -->
  <g transform="translate(70, 200)" filter="url(#glowStrong)" opacity="0.9">
    <ellipse cx="80" cy="80" rx="60" ry="55" fill="none" stroke="url(#accent)" stroke-width="4"/>
    <text x="80" y="95" font-size="65" text-anchor="middle" fill="url(#accent)">☄️</text>
  </g>

  <!-- Title -->
  <text x="250" y="250" font-family="'Courier New', monospace" font-size="76" fill="url(#textGrad)" font-weight="bold" filter="url(#glowStrong)">SolrRadar</text>

  <!-- Subtitle -->
  <text x="250" y="305" font-family="monospace" font-size="26" fill="#aaaacc">
    Mass Reconnaissance &amp; Exploitation
  </text>
  <text x="250" y="340" font-family="monospace" font-size="26" fill="#aaaacc">
    Framework for Apache Solr
  </text>

  <!-- CVE tagline -->
  <text x="250" y="385" font-family="monospace" font-size="20" fill="#FF6B00">
    CVE-2026-44825  •  Velocity Template Injection  →  RCE
  </text>

  <!-- Features row -->
  <g transform="translate(70, 470)" font-family="monospace" font-size="15">
    <rect x="0" y="0" width="160" height="34" rx="6" fill="#FF6B00" opacity="0.15"/>
    <text x="80" y="23" fill="#FF8C42" text-anchor="middle">⚡ Multi-Threaded</text>

    <rect x="172" y="0" width="170" height="34" rx="6" fill="#CC00CC" opacity="0.15"/>
    <text x="257" y="23" fill="#DD55DD" text-anchor="middle">🎯 Version Detection</text>

    <rect x="354" y="0" width="175" height="34" rx="6" fill="#FFD700" opacity="0.15"/>
    <text x="441" y="23" fill="#FFD700" text-anchor="middle">🔑 Credential Brute</text>

    <rect x="541" y="0" width="140" height="34" rx="6" fill="#FF0044" opacity="0.15"/>
    <text x="611" y="23" fill="#FF3366" text-anchor="middle">💀 RCE Exploit</text>

    <rect x="693" y="0" width="165" height="34" rx="6" fill="#8B0000" opacity="0.15"/>
    <text x="775" y="23" fill="#CC3333" text-anchor="middle">🐚 Interactive Shell</text>
  </g>

  <!-- Small logo watermark -->
  <text x="1130" y="610" font-family="monospace" font-size="12" fill="#ffffff" opacity="0.08" text-anchor="end">© SolrRadar</text>
</svg>
